<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Île d'Ali</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@600;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00b8a9;--teal-d:#008f84;--teal-l:#7eeee8;
  --purple:#9b59f5;--purple-d:#7635d8;--purple-l:#c9a8ff;
  --gold:#f9c621;--gold-d:#d9a000;--gold-l:#ffe984;
  --coral:#ff6b6b;--coral-d:#e84040;--coral-l:#ffb3b3;
  --sky:#4fc3f7;--sky-d:#0288d1;--sky-l:#b3e5fc;
  --green:#4caf50;--green-d:#2e7d32;--green-l:#a5d6a7;
  --ink:#2d2d2d;--ink-soft:#555;
  --card:#fff;--cream:#fffde7;
  --fd:'Boogaloo',cursive;--fb:'Nunito',sans-serif;--fa:'Fredoka',sans-serif;
  --sh:0 8px 0 rgba(0,0,0,.15),0 12px 24px rgba(0,0,0,.12);
  --shs:0 4px 0 rgba(0,0,0,.12),0 6px 14px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:#e8f5e9;min-height:100vh;overflow-x:hidden;}
.scene{position:fixed;inset:0;z-index:0;background:repeating-linear-gradient(90deg,rgba(0,184,169,.07) 0,rgba(0,184,169,.07) 40px,transparent 40px,transparent 80px),linear-gradient(180deg,#c8f7f4,#e8fff8 40%,#fff9e8);}
.app{position:relative;z-index:1;max-width:540px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.view{display:none;flex:1;flex-direction:column;padding:0 16px 110px;animation:pop .35s cubic-bezier(.175,.885,.32,1.275);}
.view.active{display:flex;}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
/* STATUS */
.sb{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(200,247,244,.95) 80%,transparent);}
.pts{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#fff8cc,#fff3a0);border:3px solid var(--gold-d);border-radius:999px;padding:6px 14px 6px 8px;box-shadow:0 4px 0 var(--gold-d),0 6px 12px rgba(0,0,0,.12);font-family:var(--fd);font-size:17px;color:#7a5000;}
.pts-c{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fffbe0,var(--gold) 55%,var(--gold-d));border:2px solid var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:14px;}
.stk{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#ffe0e0,#ffc8c8);border:3px solid var(--coral-d);border-radius:999px;padding:6px 14px;font-family:var(--fd);font-size:16px;color:#8b0000;box-shadow:0 4px 0 var(--coral-d);}
.av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--sky-l),var(--sky));border:3px solid var(--sky-d);box-shadow:0 4px 0 var(--sky-d);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.av svg{width:90%;height:90%;}
/* CARDS & BTNS */
.card{background:var(--card);border-radius:20px;box-shadow:var(--sh);padding:20px;border:3px solid rgba(0,0,0,.06);}
.card-gold{background:linear-gradient(135deg,#fff8cc,#ffeea0);border-color:var(--gold-d);}
.btn{font-family:var(--fd);font-size:18px;border:none;cursor:pointer;border-radius:999px;padding:14px 28px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,box-shadow .1s;}
.btn:active{transform:translateY(4px);}
.btn-green{background:linear-gradient(180deg,var(--green-l),var(--green));color:#fff;box-shadow:0 6px 0 var(--green-d),0 8px 16px rgba(0,0,0,.2);text-shadow:0 2px 0 rgba(0,0,0,.2);}
.btn-green:active{box-shadow:0 2px 0 var(--green-d);}
.btn-gold{background:linear-gradient(180deg,var(--gold-l),var(--gold));color:#7a5000;box-shadow:0 6px 0 var(--gold-d);}
.btn-gold:active{box-shadow:0 2px 0 var(--gold-d);}
.btn-purple{background:linear-gradient(180deg,var(--purple-l),var(--purple));color:#fff;box-shadow:0 6px 0 var(--purple-d);text-shadow:0 2px 0 rgba(0,0,0,.2);}
.btn-purple:active{box-shadow:0 2px 0 var(--purple-d);}
.btn-outline{background:#fff;border:3px solid currentColor;box-shadow:var(--shs);}
.btn-block{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
/* BUBBLES */
.brow{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;}
.zwrap{width:72px;height:72px;flex:0 0 auto;filter:drop-shadow(0 6px 8px rgba(0,0,0,.2));animation:wb 3s ease-in-out infinite;}
@keyframes wb{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg) translateY(-4px);}}
.zwrap svg{width:100%;height:100%;}
.bub{background:#fff;border:3px solid #e0d0ff;border-radius:20px 20px 20px 4px;padding:12px 16px;flex:1;font-family:var(--fa);font-weight:700;font-size:15px;color:var(--ink);box-shadow:0 4px 0 #c9a8ff,0 6px 14px rgba(155,89,245,.15);position:relative;}
.bub::before{content:"";position:absolute;left:-13px;bottom:6px;width:0;height:0;border:10px solid transparent;border-right-color:#e0d0ff;border-left:0;}
.bub::after{content:"";position:absolute;left:-8px;bottom:9px;width:0;height:0;border:7px solid transparent;border-right-color:#fff;border-left:0;}
.bub b{color:var(--purple-d);}
.bub .tip{display:block;font-size:13px;color:var(--ink-soft);margin-top:4px;font-weight:600;}
/* NAV */
.dnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,var(--purple-d),#4a1a9e);padding:10px 8px 12px;}
.dnav-i{max-width:540px;margin:0 auto;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.dnav-i::-webkit-scrollbar{display:none;}
.dnav button{flex:0 0 auto;font-family:var(--fb);font-weight:700;font-size:11px;background:rgba(255,255,255,.12);color:#e8d8ff;border:2px solid rgba(255,255,255,.2);border-radius:999px;padding:7px 12px;cursor:pointer;white-space:nowrap;}
.dnav button.active{background:var(--gold);color:#7a5000;border-color:var(--gold-d);}
/* LOGIN */
#vl{align-items:center;justify-content:center;text-align:center;padding-top:20px;min-height:100vh;}
.hz{width:160px;height:160px;margin:0 auto 10px;animation:hf 3s ease-in-out infinite;filter:drop-shadow(0 14px 16px rgba(0,0,0,.25));}
@keyframes hf{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-14px) scale(1.03);}}
.ltitle{font-family:var(--fd);font-size:36px;color:#fff;text-shadow:0 4px 0 var(--teal-d),0 8px 20px rgba(0,184,169,.4);margin-bottom:4px;}
.lsub{font-family:var(--fa);font-weight:600;font-size:15px;color:var(--teal-d);margin-bottom:20px;}
.pcard{background:#fff;border-radius:24px;padding:24px 22px 28px;box-shadow:0 10px 0 var(--teal-d),0 14px 30px rgba(0,0,0,.2);width:100%;max-width:320px;border:4px solid var(--teal);position:relative;overflow:hidden;}
.pcard::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,var(--teal) 0,var(--teal) 12px,var(--gold) 12px,var(--gold) 24px,var(--coral) 24px,var(--coral) 36px,var(--purple) 36px,var(--purple) 48px);}
.pav{width:90px;height:90px;border-radius:50%;border:4px solid var(--sky-d);box-shadow:0 4px 0 var(--sky-d);margin:6px auto 12px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--sky-l),var(--sky));}
.pav svg{width:86%;height:86%;}
.pname{font-family:var(--fd);font-size:24px;color:var(--ink);}
.pmeta{font-family:var(--fa);font-weight:600;font-size:13px;color:var(--ink-soft);margin-bottom:18px;}
/* PROGRESS */
.pw{display:flex;align-items:center;gap:10px;margin:12px 0 18px;}
.pt{flex:1;height:18px;background:#e0e0e0;border-radius:999px;overflow:hidden;border:3px solid rgba(0,0,0,.08);box-shadow:inset 0 2px 4px rgba(0,0,0,.12);}
.pf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal-l),var(--teal));transition:width .5s cubic-bezier(.2,.8,.2,1);}
.pl{font-family:var(--fd);font-size:15px;color:var(--ink);white-space:nowrap;}
/* QUESTION */
.qcard{background:#fff;border-radius:20px;box-shadow:0 6px 0 rgba(0,0,0,.1),0 10px 20px rgba(0,0,0,.1);border:3px solid rgba(0,0,0,.06);padding:22px;text-align:center;margin-bottom:16px;}
.qsubj{display:inline-block;font-family:var(--fd);font-size:13px;background:linear-gradient(135deg,var(--purple-l),var(--purple));color:#fff;padding:5px 14px;border-radius:999px;margin-bottom:10px;box-shadow:0 3px 0 var(--purple-d);}
.qtext{font-family:var(--fd);font-size:24px;color:var(--ink);line-height:1.3;}
.qcons{font-family:var(--fa);font-weight:700;font-size:13px;background:linear-gradient(135deg,#fff8cc,#ffeea0);border:2px solid var(--gold-d);border-radius:12px;padding:8px 12px;margin-bottom:12px;color:#7a5000;text-align:left;}
/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{background:#fff;border:3px solid #e0e0e0;border-radius:14px;padding:14px 16px;font-family:var(--fb);font-weight:700;font-size:16px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.12s;box-shadow:0 4px 0 #c0c0c0;}
.opt:hover{transform:translateY(-2px);box-shadow:0 6px 0 #b0b0b0;border-color:var(--teal);}
.opt:active{transform:translateY(2px);box-shadow:0 2px 0 #c0c0c0;}
.opt.correct{background:linear-gradient(135deg,#e8fff0,#c8f7d8);border-color:var(--green);box-shadow:0 4px 0 var(--green-d);}
.opt.wrong{background:linear-gradient(135deg,#fff0f0,#ffd8d8);border-color:var(--coral);box-shadow:0 4px 0 var(--coral-d);}
.olet{width:30px;height:30px;border-radius:50%;flex:0 0 auto;background:linear-gradient(135deg,var(--purple-l),var(--purple));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px;box-shadow:0 3px 0 var(--purple-d);}
.opt.correct .olet{background:linear-gradient(135deg,var(--green-l),var(--green));box-shadow:0 3px 0 var(--green-d);}
.opt.wrong .olet{background:linear-gradient(135deg,var(--coral-l),var(--coral));box-shadow:0 3px 0 var(--coral-d);}
/* FEEDBACK */
.fb{display:none;border-radius:16px;padding:14px;text-align:center;font-family:var(--fd);font-size:17px;margin-top:12px;}
.fb.show{display:block;}
.fb.good{background:linear-gradient(135deg,#e8fff0,#c8f7d8);border:3px solid var(--green);color:var(--green-d);box-shadow:0 4px 0 var(--green-d);}
.fb.bad{background:linear-gradient(135deg,#fff0f0,#ffd8d8);border:3px solid var(--coral);color:var(--coral-d);box-shadow:0 4px 0 var(--coral-d);}
/* SKILLS */
.skl{display:flex;flex-direction:column;gap:14px;margin:14px 0;}
.ski .skh{display:flex;justify-content:space-between;font-family:var(--fd);font-size:16px;color:var(--ink);margin-bottom:6px;}
.skt{height:18px;background:#e0e0e0;border-radius:999px;overflow:hidden;border:3px solid rgba(0,0,0,.07);box-shadow:inset 0 2px 4px rgba(0,0,0,.1);}
.skf{height:100%;border-radius:999px;transition:width 1.2s cubic-bezier(.2,.8,.2,1);}
/* PRIO */
.plist{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.pitem{display:flex;align-items:flex-start;gap:12px;background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shs);border-left:8px solid var(--coral);}
.pitem.p2{border-left-color:var(--gold-d);}
.pitem.p3{border-left-color:var(--teal);}
.pitem.p4{border-left-color:var(--purple);}
.pbadge{font-family:var(--fd);font-size:13px;color:#fff;background:var(--coral);border-radius:8px;padding:4px 9px;flex:0 0 auto;box-shadow:0 3px 0 var(--coral-d);}
.pitem.p2 .pbadge{background:var(--gold-d);box-shadow:0 3px 0 #a07000;}
.pitem.p3 .pbadge{background:var(--teal);box-shadow:0 3px 0 var(--teal-d);}
.pitem.p4 .pbadge{background:var(--purple);box-shadow:0 3px 0 var(--purple-d);}
.ptitle2{font-family:var(--fd);font-size:16px;color:var(--ink);}
.pdesc{font-size:12.5px;color:var(--ink-soft);margin-top:3px;font-family:var(--fa);font-weight:600;}
/* DASH */
.dh{font-family:var(--fd);font-size:28px;color:var(--ink);padding:14px 0 2px;}
.icard{position:relative;border-radius:24px;overflow:hidden;margin:12px 0 18px;cursor:pointer;box-shadow:0 8px 0 var(--teal-d),0 12px 24px rgba(0,0,0,.18);min-height:180px;background:linear-gradient(160deg,#4fc3f7,#00b8a9 50%,#4caf50);border:4px solid #fff;display:flex;flex-direction:column;justify-content:flex-end;padding:16px;transition:.2s;}
.icard:hover{transform:translateY(-3px);}
.ilbl{align-self:flex-start;background:rgba(255,255,255,.95);font-family:var(--fd);font-size:13px;color:var(--teal-d);padding:6px 14px;border-radius:999px;margin-bottom:auto;border:2px solid var(--teal);box-shadow:0 3px 0 var(--teal-d);}
.ideco{position:absolute;filter:drop-shadow(0 4px 8px rgba(0,0,0,.25));}
.istats{display:flex;gap:8px;margin-top:10px;}
.istat{background:rgba(255,255,255,.95);border-radius:12px;padding:7px 12px;font-family:var(--fd);font-size:13px;color:var(--teal-d);border:2px solid var(--teal);box-shadow:0 3px 0 var(--teal-d);}
.mt{font-family:var(--fd);font-size:20px;color:var(--ink);margin:4px 0 12px;}
.mc{display:flex;align-items:center;gap:14px;background:#fff;border-radius:18px;padding:14px 16px;box-shadow:var(--shs);margin-bottom:12px;border:3px solid #e8e0ff;cursor:pointer;transition:.15s;}
.mc:hover{transform:translateY(-2px);box-shadow:var(--sh);}
.mc.done{background:linear-gradient(135deg,#f0fff4,#dff5e4);border-color:var(--green);}
.mc.locked{opacity:.5;cursor:not-allowed;}
.mi{width:54px;height:54px;border-radius:16px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:26px;background:linear-gradient(135deg,var(--gold-l),var(--gold));border:3px solid var(--gold-d);box-shadow:0 4px 0 var(--gold-d);}
.mi.m2{background:linear-gradient(135deg,var(--teal-l),var(--teal));border-color:var(--teal-d);box-shadow:0 4px 0 var(--teal-d);}
.mi.m3{background:linear-gradient(135deg,var(--coral-l),var(--coral));border-color:var(--coral-d);box-shadow:0 4px 0 var(--coral-d);}
.mb{flex:1;}
.mn{font-family:var(--fd);font-size:16.5px;color:var(--ink);}
.md{font-size:12.5px;color:var(--ink-soft);margin-top:2px;font-family:var(--fa);font-weight:600;}
.mpts{font-family:var(--fd);font-size:14px;color:var(--gold-d);flex:0 0 auto;}
.mchk{width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 0 var(--green-d);}
/* SHOP */
.ptsbanner{background:linear-gradient(135deg,var(--gold-l),var(--gold));border-radius:20px;padding:20px;text-align:center;margin:14px 0 18px;box-shadow:0 6px 0 var(--gold-d),0 10px 20px rgba(0,0,0,.15);border:4px solid var(--gold-d);}
.ptsbig{font-family:var(--fd);font-size:38px;color:#7a5000;}
.ptslbl{font-family:var(--fa);font-weight:700;font-size:13px;color:#9a6a00;}
.shoplist{display:flex;flex-direction:column;gap:10px;}
.shopitem{display:flex;align-items:center;gap:14px;background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shs);border:3px solid #e8e0ff;}
.shopitem.afford{border-color:var(--green);}
.shopic{width:52px;height:52px;border-radius:14px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:26px;background:linear-gradient(135deg,#f0f0f0,#e0e0e0);border:2px solid #ccc;}
.shopnm{font-family:var(--fd);font-size:16px;color:var(--ink);}
.shopcost{font-family:var(--fa);font-weight:600;font-size:13px;color:var(--ink-soft);}
.shopbtn{font-family:var(--fd);font-size:13px;padding:9px 14px;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--green-l),var(--green));color:#fff;box-shadow:0 3px 0 var(--green-d);}
.shopbtn:disabled{background:#ccc;box-shadow:0 3px 0 #aaa;cursor:not-allowed;}
/* BADGES */
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
.btile{background:#fff;border-radius:18px;padding:14px 8px;text-align:center;box-shadow:var(--shs);border:3px solid #e8e0ff;}
.btile.locked{opacity:.4;filter:grayscale(1);}
.btile.unlocked{border-color:var(--gold-d);background:linear-gradient(135deg,#fffbe0,#fff3a0);}
.bem{font-size:36px;margin-bottom:5px;}
.bnm{font-family:var(--fd);font-size:12px;color:var(--ink);}
/* PARENT */
.pw2{background:linear-gradient(180deg,var(--purple-d),#3a0d8e);min-height:100vh;}
.pt2{display:flex;align-items:center;justify-content:space-between;padding:18px;max-width:540px;margin:0 auto;}
.pt2 h2{font-family:var(--fd);font-size:22px;color:#fff;}
.pt2 .bk{font-family:var(--fb);font-weight:700;font-size:13px;color:#c9a8ff;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);padding:8px 14px;border-radius:999px;cursor:pointer;}
.psr{display:flex;gap:10px;padding:0 18px;max-width:540px;margin:0 auto;}
.pst{flex:1;background:rgba(255,255,255,.1);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.1);}
.pstn{font-family:var(--fd);font-size:24px;color:#fff;}
.pstl{font-size:11px;color:#c9a8ff;margin-top:2px;font-family:var(--fa);font-weight:600;}
.ptabs{display:flex;gap:6px;max-width:540px;margin:16px auto 0;padding:0 18px;overflow-x:auto;scrollbar-width:none;}
.ptabs::-webkit-scrollbar{display:none;}
.ptab{flex:0 0 auto;font-family:var(--fd);font-size:13px;color:#c9a8ff;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.12);padding:9px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;}
.ptab.active{background:var(--gold);color:#7a5000;border-color:var(--gold-d);}
.pbody{max-width:540px;margin:0 auto;padding:16px;}
.pc2{background:rgba(255,255,255,.08);border-radius:18px;padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,.07);}
.pc2 h3{color:#fff;font-family:var(--fd);font-size:17px;margin-bottom:12px;}
.spr2{margin-bottom:12px;}
.spr2-t{display:flex;justify-content:space-between;font-family:var(--fd);font-size:14px;color:#d8c8ff;margin-bottom:5px;}
.spr2-tr{height:12px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;}
.spr2-f{height:100%;border-radius:999px;}
.alt{display:flex;gap:10px;background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:12px;margin-bottom:10px;}
.alt-t{font-size:13px;color:#ffd8d8;font-family:var(--fa);font-weight:600;line-height:1.4;}
.rco{display:flex;gap:10px;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.25);border-radius:12px;padding:12px;margin-bottom:8px;}
.rco-t{font-size:13px;color:#c8f7d8;font-family:var(--fa);font-weight:600;line-height:1.4;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pbtn2{font-family:var(--fd);font-size:14px;padding:10px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#c9a8ff;cursor:pointer;text-align:center;}
.pbtn2.active{background:var(--gold);color:#7a5000;border-color:var(--gold-d);}
.ptri{font-family:var(--fd);font-size:14px;color:var(--gold-l);margin-bottom:8px;margin-top:14px;}
.psubj{background:rgba(255,255,255,.06);border-radius:10px;padding:10px;margin-bottom:8px;}
.psubjn{font-family:var(--fd);font-size:13px;color:#fff;margin-bottom:5px;}
.ptags{display:flex;flex-wrap:wrap;gap:5px;}
.ptag{font-size:11px;font-family:var(--fa);font-weight:700;color:#d8c8ff;background:rgba(255,255,255,.08);border-radius:6px;padding:3px 8px;}
.tgl{width:40px;height:24px;border-radius:999px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;flex:0 0 auto;}
.tgl.on{background:var(--green);}
.tgl::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;}
.tgl.on::after{left:19px;}
.rrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-family:var(--fa);font-weight:700;font-size:13px;color:#d8c8ff;}
/* SECTION */
.st{font-family:var(--fd);font-size:22px;color:var(--ink);margin:16px 0 4px;}
.ss{font-family:var(--fa);font-weight:600;font-size:13.5px;color:var(--ink-soft);margin-bottom:14px;}
/* CONFETTI */
.cfp{position:fixed;top:-24px;z-index:300;border-radius:3px;pointer-events:none;animation:cfa linear forwards;}
@keyframes cfa{to{transform:translateY(110vh) rotate(720deg);opacity:.2;}}
/* COMPLETE */
.cwrap{text-align:center;padding:24px 0;}
.czappy{width:120px;height:120px;margin:0 auto 12px;animation:hf 3s ease-in-out infinite;filter:drop-shadow(0 8px 12px rgba(0,0,0,.2));}
.cpts{display:inline-block;font-family:var(--fd);font-size:22px;color:#7a5000;background:linear-gradient(135deg,var(--gold-l),var(--gold));border:3px solid var(--gold-d);border-radius:16px;padding:12px 24px;box-shadow:0 5px 0 var(--gold-d);margin:14px 0;}
/* LOADING */
.loading{text-align:center;padding:60px 20px;}
.loading .lico{font-size:60px;animation:wb 1s infinite;}
.loading .ltxt{font-family:var(--fd);font-size:20px;margin-top:16px;color:var(--purple-d);}
.loading .lsub{font-size:14px;color:var(--ink-soft);margin-top:8px;}
/* EXERCISE MENU */
.emenu-card{display:flex;align-items:center;gap:14px;background:#fff;border-radius:18px;padding:14px 16px;box-shadow:var(--shs);margin-bottom:12px;cursor:pointer;transition:.15s;}
.emenu-card:hover{transform:translateY(-2px);box-shadow:var(--sh);}
::-webkit-scrollbar{width:0;height:0;}

function pickRandom(arr,n){
  var a=arr.slice().sort(function(){return Math.random()-.5;});
  return a.slice(0,Math.min(n,a.length));
}

function addPts(n){ST.pts+=n;document.querySelectorAll('.pts-live').forEach(function(e){e.textContent=ST.pts;});}

function showScreen(name){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  var el=document.getElementById('v-'+name);
  if(el) el.classList.add('active');
  document.querySelectorAll('.dnav button').forEach(function(b){b.classList.toggle('active',b.dataset.s===name);});
  window.scrollTo({top:0,behavior:'instant'});
}

function goTo(name){
  if(name==='results') renderResults();
  else if(name==='dash') renderDash();
  else if(name==='rewards') renderRewards();
  else if(name==='parent') renderParent();
  else if(name==='quiz'){ST.quizIdx=0;ST.quizScore=0;renderQuiz();}
  else if(name==='exercise') renderExMenu();
  showScreen(name);
}

function generateAI(setKey,cb){
  var prompts={
    soustraction:'Genere 4 exercices de soustraction posee niveau CE2. Reponds UNIQUEMENT avec un tableau JSON valide. Exemple format : [{"q":"352-128=?","opts":["224","234","214","244"],"correct":0}]. 4 objets, cles q opts correct.',
    multiplication:'Genere 4 exercices tables de multiplication (6,7,8,9) CE2. Tableau JSON uniquement. Format : [{"q":"6x9=?","opts":["54","48","56","63"],"correct":0}].',
    gn_accord:'Genere 3 exercices accord groupe nominal CE2. Tableau JSON uniquement. Format : [{"q":"Choisis...","opts":["A","B","C","D"],"correct":0}].',
    sujet_verbe:'Genere 3 exercices accord sujet-verbe CE2. Tableau JSON uniquement. Format : [{"q":"Les enfants ___ au parc.","opts":["joue","jouent","joues","jouer"],"correct":1}].',
    lecture:'Genere 3 exercices comprehension lecture CE2. Tableau JSON uniquement. Format : [{"texte":"Lea pose...","q":"Que fait...?","opts":["A","B","C","D"],"correct":0}].',
    calcul_mental:'Genere 4 exercices calcul mental CE2. Tableau JSON uniquement. Format : [{"q":"58+37=?","opts":["85","95","94","96"],"correct":1}].'
  };
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,messages:[{role:'user',content:prompts[setKey]}]})
  }).then(function(r){return r.json();}).then(function(data){
    try{
      var txt=(data.content||[]).map(function(c){return c.text||'';}).join('');
      var clean=txt.replace(/[\u0060]{3}json|[\u0060]{3}/g,'').trim();
      var qs=JSON.parse(clean);
      if(Array.isArray(qs)&&qs.length>0) cb(qs); else cb(null);
    }catch(e){cb(null);}
  }).catch(function(){cb(null);});
}

}

.music-btn{
  position:fixed;bottom:62px;right:12px;z-index:200;

</style>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Musique">🎵</button>

<script>
// ── Musique de fond fun générée par Web Audio API ──
var audioCtx = null;
var musicNodes = [];
var musicPlaying = false;
var musicScheduled = false;

// Mélodie joyeuse inspirée d'un thème d'aventure (notes en Hz)
var MELODY = [
  // Thème principal — do majeur
  [523.25, 0.3],  // do5
  [587.33, 0.15], // re5
  [659.25, 0.15], // mi5
  [783.99, 0.3],  // sol5
  [659.25, 0.15], // mi5
  [587.33, 0.15], // re5
  [523.25, 0.6],  // do5
  [0,      0.15], // silence
  [392.00, 0.3],  // sol4
  [440.00, 0.15], // la4
  [493.88, 0.15], // si4
  [523.25, 0.3],  // do5
  [493.88, 0.15], // si4
  [440.00, 0.15], // la4
  [392.00, 0.6],  // sol4
  [0,      0.15], // silence
  [659.25, 0.3],  // mi5
  [698.46, 0.15], // fa5
  [783.99, 0.15], // sol5
  [880.00, 0.3],  // la5
  [783.99, 0.15], // sol5
  [698.46, 0.15], // fa5
  [659.25, 0.45], // mi5
  [0,      0.15], // silence
  [523.25, 0.15], // do5
  [587.33, 0.15], // re5
  [659.25, 0.15], // mi5
  [783.99, 0.6],  // sol5
  [659.25, 0.15], // mi5
  [523.25, 0.75], // do5
  [0,      0.3],  // silence
];

// Basse d'accompagnement (pattern répété)
var BASS = [
  [130.81, 0.6], // do2
  [0,      0.6],
  [196.00, 0.6], // sol2
  [0,      0.6],
  [174.61, 0.6], // fa2
  [0,      0.6],
  [196.00, 0.6], // sol2
  [0,      0.6],
];

function initAudio(){
  if(audioCtx) return true;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return true;
  }catch(e){ return false; }
}

function playNote(freq, startTime, duration, gainVal, type){
  if(!audioCtx || freq === 0) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(gainVal, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration - 0.02);
  osc.start(startTime);
  osc.stop(startTime + duration);
  musicNodes.push(osc);
}

function scheduleMusic(){
  if(!musicPlaying || !audioCtx) return;
  var now = audioCtx.currentTime;
  var t = now + 0.05;
  // Jouer mélodie
  for(var i=0;i<MELODY.length;i++){
    playNote(MELODY[i][0], t, MELODY[i][1] * 0.95, 0.08, 'triangle');
    t += MELODY[i][1];
  }
  // Jouer basse en boucle sous la mélodie
  var bt = now + 0.05;
  var totalDur = MELODY.reduce(function(s,n){return s+n[1];},0);
  while(bt < now + 0.05 + totalDur + 0.5){
    for(var j=0;j<BASS.length;j++){
      playNote(BASS[j][0], bt, BASS[j][1] * 0.9, 0.04, 'sine');
      bt += BASS[j][1];
    }
  }
  // Reprogrammer la prochaine boucle
  var loopDur = totalDur + 0.3;
  setTimeout(function(){
    if(musicPlaying) scheduleMusic();
  }, (loopDur - 0.5) * 1000);
}

function startMusic(){
  if(!initAudio()) return;
  if(audioCtx.state === 'suspended') audioCtx.resume();
  musicPlaying = true;
  scheduleMusic();
  document.getElementById('musicBtn').textContent = '🎵';
  document.getElementById('musicBtn').classList.remove('muted');
}

function stopMusic(){
  musicPlaying = false;
  musicNodes.forEach(function(n){
    try{ n.stop(); }catch(e){}
  });
  musicNodes = [];
  document.getElementById('musicBtn').textContent = '🔇';
  document.getElementById('musicBtn').classList.add('muted');
}

function toggleMusic(){
  if(musicPlaying) stopMusic();
  else startMusic();
}

// Démarrer automatiquement au premier clic sur la page
document.addEventListener('click', function startOnce(){
  if(!musicPlaying && !document.getElementById('musicBtn').classList.contains('muted')){
    startMusic();
  }
  document.removeEventListener('click', startOnce);
}, {once: true});
</script>
